<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>จัดการสถานะเอกสาร</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="./theme-legacy.css?v=20260317-6">
  <style>
    .status-page {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
      --status-control-height: 50px;
    }

    .status-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .page-doc-status {
      --sheet-card-border: rgba(59, 130, 246, 0.36);
      --sheet-card-bg: linear-gradient(180deg, rgba(236, 248, 255, 0.9), rgba(219, 234, 254, 0.72));
      --sheet-card-shadow: 0 30px 58px rgba(15, 23, 42, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.84);
      --sheet-body-bg: linear-gradient(180deg, rgba(219, 234, 254, 0.46), rgba(191, 219, 254, 0.24));
      --sheet-section-border: rgba(59, 130, 246, 0.24);
      --sheet-section-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(239, 246, 255, 0.76));
      --sheet-section-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.84), 0 10px 24px rgba(15, 23, 42, 0.06);
      --sheet-header-grad: linear-gradient(145deg, #66baff 0%, #3196fb 42%, #1f79f0 100%);
      --sheet-soft-bg: rgba(59, 130, 246, 0.1);
      --sheet-soft-border: rgba(59, 130, 246, 0.28);
      --sheet-soft-text: #0a63cf;
      --sheet-button-grad: linear-gradient(145deg, #66baff 0%, #3196fb 42%, #1f79f0 100%);
      --sheet-button-shadow: 0 16px 34px rgba(10, 132, 255, 0.26);
      --sheet-popup-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(241, 248, 255, 0.95));
      --sheet-popup-border: rgba(59, 130, 246, 0.26);
    }

    .back-btn {
      border: 1px solid var(--input-border);
      background: var(--card-bg);
      color: var(--text-color);
      min-height: 40px;
      border-radius: 999px;
      font-weight: 760;
      padding: 0 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      text-decoration: none;
    }

    .back-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(10, 132, 255, 0.45);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.14);
    }

    .main-card {
      overflow: hidden;
      border: 1px solid var(--sheet-card-border) !important;
      background: var(--sheet-card-bg) !important;
      box-shadow: var(--sheet-card-shadow) !important;
    }

    .header-bg {
      background: var(--sheet-header-grad);
      color: #fff;
      text-align: center;
      padding: 22px 16px;
      position: relative;
      overflow: hidden;
    }

    .header-bg::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      right: -66px;
      top: -90px;
      background: rgba(255, 255, 255, 0.18);
      pointer-events: none;
    }

    .header-bg > .header-hero-icon {
      font-size: 2rem;
      margin-bottom: 5px;
      display: inline-block;
    }

    .header-bg h3 {
      margin: 0;
      font-size: 1.18rem;
      font-weight: 860;
    }

    .header-bg small {
      display: block;
      margin-top: 4px;
      opacity: 0.94;
      font-weight: 640;
      font-size: 0.84rem;
    }

    .header-badges {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .h-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 13px;
      border-radius: 999px;
      font-size: 0.77rem;
      font-weight: 800;
      border: 1px solid rgba(255, 255, 255, 0.58);
      line-height: 1.15;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.24));
      color: #f8fbff;
      text-shadow: 0 1px 0 rgba(15, 23, 42, 0.2);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.34), 0 10px 20px rgba(15, 23, 42, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .h-badge i {
      font-size: 0.84rem;
      line-height: 1;
      margin: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .h-badge.sheet-blue {
      background: linear-gradient(180deg, rgba(59, 130, 246, 0.64), rgba(37, 99, 235, 0.5));
      border-color: rgba(191, 219, 254, 0.74);
      color: #eff6ff;
    }

    .h-badge.sheet-pink {
      background: linear-gradient(180deg, rgba(236, 72, 153, 0.64), rgba(219, 39, 119, 0.5));
      border-color: rgba(251, 207, 232, 0.74);
      color: #fff1f7;
    }

    .h-badge.sheet-green {
      background: linear-gradient(180deg, rgba(34, 197, 94, 0.64), rgba(22, 163, 74, 0.5));
      border-color: rgba(187, 247, 208, 0.74);
      color: #f0fdf4;
    }

    .h-badge.sheet-other {
      background: linear-gradient(180deg, rgba(100, 116, 139, 0.62), rgba(71, 85, 105, 0.5));
      border-color: rgba(203, 213, 225, 0.74);
      color: #f8fafc;
    }

    .status-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--sheet-body-bg);
    }

    .desc-note {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.84rem;
      line-height: 1.5;
      font-weight: 620;
      border: none !important;
      background: transparent !important;
      box-shadow: none !important;
      border-radius: 0;
      padding: 0 !important;
    }

    .desc-note.emphasis {
      color: var(--sheet-soft-text);
      background: transparent !important;
      border: none !important;
      border-radius: 0;
      padding: 0 !important;
      font-weight: 680;
    }

    .status-log-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status-log-meta {
      display: block;
      margin: 0;
      padding: 0 !important;
      border-radius: 0;
      border: none !important;
      background: transparent !important;
      box-shadow: none !important;
      color: var(--text-color);
      font-size: 0.86rem;
      font-weight: 720;
    }

    .history-popup-btn {
      border: 1px solid var(--sheet-soft-border);
      border-radius: 999px;
      background: var(--sheet-soft-bg);
      color: var(--sheet-soft-text);
      min-height: 32px;
      padding: 0 12px;
      font-size: 0.79rem;
      font-weight: 760;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .history-popup-btn:hover {
      border-color: var(--sheet-soft-border);
      background: rgba(255, 255, 255, 0.42);
    }

    .history-popup-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .history-popup-content {
      text-align: left;
      display: grid;
      gap: 8px;
      max-height: 60vh;
      overflow: auto;
      padding-right: 4px;
    }

    .history-popup-block {
      border: 1px solid var(--sheet-section-border);
      border-radius: 10px;
      background: var(--sheet-section-bg);
      padding: 8px 10px;
    }

    .history-popup-title {
      margin: 0 0 3px;
      color: var(--text-color);
      font-size: 0.83rem;
      font-weight: 760;
      line-height: 1.3;
    }

    .history-popup-line {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.76rem;
      line-height: 1.34;
      word-break: break-word;
    }

    body.dark-mode .desc-note {
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      color: #b8c5d8;
    }

    body.dark-mode .desc-note.emphasis {
      color: var(--sheet-soft-text);
      background: transparent !important;
      border: none !important;
    }

    body.dark-mode .status-log-meta {
      color: #d0deef;
    }

    body.dark-mode .history-popup-btn {
      color: #bfdbfe;
      border-color: rgba(118, 178, 252, 0.44);
      background: rgba(13, 90, 170, 0.28);
    }

    body.dark-mode .history-popup-btn:hover {
      border-color: rgba(148, 196, 255, 0.62);
      background: rgba(13, 90, 170, 0.38);
    }

    body.dark-mode .history-popup-block {
      border-color: rgba(89, 120, 160, 0.45);
      background: rgba(39, 57, 84, 0.28);
    }

    .steps-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    #stepsWrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toolbar-btn {
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-color);
      min-height: 36px;
      border-radius: 999px;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 760;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .toolbar-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(10, 132, 255, 0.5);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
    }

    .toolbar-btn.primary {
      background: var(--sheet-button-grad);
      color: #fff;
      border-color: var(--sheet-soft-border);
      box-shadow: var(--sheet-button-shadow);
    }

    body.dark-mode .toolbar-btn.primary {
      border-color: rgba(80, 162, 255, 0.55);
      box-shadow: 0 12px 24px rgba(8, 102, 202, 0.28);
    }

    .status-body #stepsWrap > .form-section {
      position: relative;
      display: block;
      margin: 0 !important;
      border: 1px solid var(--sheet-section-border) !important;
      background: var(--sheet-section-bg) !important;
      box-shadow: var(--sheet-section-shadow) !important;
      overflow: hidden;
      isolation: isolate;
      z-index: 0;
      border-radius: 14px;
      padding: 13px;
      transition: border-color 0.24s ease, background-color 0.24s ease;
    }

    .status-body #stepsWrap > .form-section + .form-section {
      margin-top: 0 !important;
    }

    body.dark-mode .status-body #stepsWrap > .form-section {
      border-color: rgba(73, 102, 139, 0.35) !important;
      background: rgba(11, 24, 44, 0.38) !important;
      box-shadow: none !important;
    }

    .status-step-card.active {
      border-color: var(--sheet-soft-border) !important;
      background: var(--sheet-soft-bg) !important;
      box-shadow: none !important;
    }

    body.dark-mode .status-step-card.active {
      border-color: rgba(76, 150, 255, 0.5) !important;
      background: rgba(8, 92, 190, 0.22) !important;
      box-shadow: none !important;
    }

    .form-section-title {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin: 0;
      font-size: 1rem;
      font-weight: 820;
      color: var(--text-color);
      line-height: 1.15;
    }

    .step-index-badge {
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--sheet-soft-bg);
      border: 1px solid var(--sheet-soft-border);
      color: var(--sheet-soft-text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.74rem;
      font-weight: 800;
      line-height: 1;
      margin-right: 2px;
      flex: 0 0 auto;
    }

    body.dark-mode .step-index-badge {
      color: #9dc6ff;
      border-color: rgba(141, 185, 255, 0.38);
      background: rgba(35, 92, 162, 0.34);
    }

    body.dark-mode .step-count-chip {
      color: #bfdbfe;
      background: rgba(13, 90, 170, 0.36);
    }

    .step-sub {
      margin: 4px 0 0 0;
      color: var(--text-muted);
      font-size: 0.76rem;
      font-weight: 600;
      line-height: 1.35;
      padding-left: 29px;
    }

    .step-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .step-head-main {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .step-title-wrap {
      min-width: 0;
    }

    .step-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .step-count-chip {
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 760;
      color: var(--sheet-soft-text);
      background: var(--sheet-soft-bg);
      white-space: nowrap;
      line-height: 1.3;
    }

    .switch {
      position: relative;
      display: inline-flex;
      width: 52px;
      height: 30px;
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: rgba(148, 163, 184, 0.6);
      transition: 0.2s;
      border-radius: 999px;
    }

    .slider:before {
      position: absolute;
      content: "";
      width: 24px;
      height: 24px;
      left: 3px;
      top: 3px;
      background: #fff;
      transition: 0.2s;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .switch input:checked + .slider {
      background: #16a34a;
    }

    .switch input:checked + .slider:before {
      transform: translateX(22px);
    }

    .step-state {
      min-height: 28px;
      border-radius: 999px;
      border: none;
      background: rgba(148, 163, 184, 0.14);
      color: var(--text-muted);
      font-size: 0.74rem;
      font-weight: 760;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      white-space: nowrap;
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .step-state.on {
      background: rgba(34, 197, 94, 0.16);
      color: #166534;
    }

    body.dark-mode .step-state {
      border: none;
      background: rgba(57, 84, 120, 0.26);
      color: #b8c5d8;
    }

    body.dark-mode .step-state.on {
      background: rgba(20, 126, 82, 0.28);
      color: #86efac;
    }

    .status-detail {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      transition: opacity 0.2s ease;
    }

    .status-detail.disabled {
      opacity: 0.55;
      pointer-events: none;
    }

    .form-label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.81rem;
      font-weight: 760;
      color: var(--text-muted);
    }

    .status-field {
      border: none;
      border-radius: 0;
      background: transparent;
      padding: 0;
    }

    body.dark-mode .status-field {
      background: transparent;
      border-color: transparent;
    }

    .status-field.remark-field {
      padding: 10px;
      border-radius: 12px;
      background: var(--sheet-soft-bg);
      border: 1px solid var(--sheet-soft-border);
    }

    body.dark-mode .status-field.remark-field {
      background: rgba(57, 84, 120, 0.2);
    }

    .form-control,
    .form-select {
      width: 100%;
      min-height: var(--status-control-height);
      height: var(--status-control-height);
      border-radius: 14px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-color);
      font: inherit;
      padding: 0 12px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      font-weight: 550;
      line-height: 1.24;
    }

    .form-select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding-right: 40px;
      background-image: var(--dd-arrow-light);
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 14px 14px;
    }

    body.dark-mode .form-select {
      background-image: var(--dd-arrow-dark);
    }

    .form-control:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--sheet-soft-border);
      box-shadow: 0 0 0 3px var(--sheet-soft-bg);
    }

    textarea.form-control {
      min-height: 112px;
      height: auto;
      padding: 11px 12px;
      line-height: 1.42;
      resize: vertical;
    }

    .thai-date-input .form-control {
      display: flex;
      align-items: center;
      min-height: var(--status-control-height);
      height: var(--status-control-height);
      padding-right: 36px;
      padding-left: 14px;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .member-select-wrap {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .member-avatar-sm {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--sheet-soft-bg);
      border: none;
      box-shadow: none;
      color: var(--sheet-soft-text);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .member-avatar-sm img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .member-select-wrap .form-select {
      min-height: var(--status-control-height);
      height: var(--status-control-height);
      padding-left: 14px;
      padding-right: 40px;
      font-weight: 650;
    }

    .submit-btn {
      border: none;
      width: 100%;
      min-height: 48px;
      border-radius: 999px;
      font: inherit;
      font-weight: 860;
      color: #fff;
      background: var(--sheet-button-grad);
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s ease, box-shadow 0.25s ease;
      box-shadow: var(--sheet-button-shadow);
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 22px 42px rgba(15, 23, 42, 0.26);
    }

    .swal2-popup.sheet-popup-blue,
    .swal2-popup.sheet-popup-pink,
    .swal2-popup.sheet-popup-green,
    .swal2-popup.sheet-popup-other {
      border-radius: 24px;
      border: 1px solid var(--sheet-popup-border);
      background: var(--sheet-popup-bg);
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.18);
    }

    .swal2-popup.sheet-popup-blue {
      --sheet-popup-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(239, 246, 255, 0.96));
      --sheet-popup-border: rgba(59, 130, 246, 0.26);
    }

    .swal2-popup.sheet-popup-pink {
      --sheet-popup-bg: linear-gradient(180deg, rgba(255, 250, 252, 0.98), rgba(252, 231, 243, 0.96));
      --sheet-popup-border: rgba(236, 72, 153, 0.28);
    }

    .swal2-popup.sheet-popup-green {
      --sheet-popup-bg: linear-gradient(180deg, rgba(247, 255, 250, 0.98), rgba(220, 252, 231, 0.96));
      --sheet-popup-border: rgba(34, 197, 94, 0.28);
    }

    .swal2-popup.sheet-popup-other {
      --sheet-popup-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(241, 245, 249, 0.96));
      --sheet-popup-border: rgba(100, 116, 139, 0.3);
    }

    body.dark-mode .swal2-popup.sheet-popup-blue,
    body.dark-mode .swal2-popup.sheet-popup-pink,
    body.dark-mode .swal2-popup.sheet-popup-green,
    body.dark-mode .swal2-popup.sheet-popup-other {
      color: #e5eefc;
      box-shadow: 0 28px 54px rgba(2, 8, 20, 0.52);
    }

    body.dark-mode .swal2-popup.sheet-popup-blue {
      --sheet-popup-bg: linear-gradient(180deg, rgba(15, 28, 46, 0.96), rgba(12, 22, 36, 0.95));
      --sheet-popup-border: rgba(96, 165, 250, 0.34);
    }

    body.dark-mode .swal2-popup.sheet-popup-pink {
      --sheet-popup-bg: linear-gradient(180deg, rgba(52, 20, 36, 0.96), rgba(34, 12, 24, 0.95));
      --sheet-popup-border: rgba(244, 114, 182, 0.34);
    }

    body.dark-mode .swal2-popup.sheet-popup-green {
      --sheet-popup-bg: linear-gradient(180deg, rgba(16, 38, 28, 0.96), rgba(12, 28, 20, 0.95));
      --sheet-popup-border: rgba(74, 222, 128, 0.34);
    }

    body.dark-mode .swal2-popup.sheet-popup-other {
      --sheet-popup-bg: linear-gradient(180deg, rgba(20, 28, 40, 0.96), rgba(14, 20, 30, 0.95));
      --sheet-popup-border: rgba(148, 163, 184, 0.34);
    }

    body.page-doc-status.sheet-theme-blue {

        doc: null,

        members: [],

        statusDraftData: null
      };

        { key: 'verify', label: 'ตรวจสอบ', icon: 'bi-search' },
        { key: 'boss', label: 'หัวหน้าผ่านงาน', icon: 'bi-person-check' },
        { key: 'sign', label: 'เสนอลงนาม', icon: 'bi-pen' }
      ];

      var els = {
        btnBack: document.getElementById('btnBack'),
        errBox: document.getElementById('errBox'),
        mainCard: document.getElementById('mainCard'),
        docHead: document.getElementById('docHead'),
        headerBadges: document.getElementById('headerBadges'),

        btnShowHistoryAll: document.getElementById('btnShowHistoryAll'),
        statusRemark: document.getElementById('statusRemark'),
        btnSubmit: document.getElementById('btnSubmit'),
        loadingMsg: document.getElementById('loadingMsg')
      };

      function showError(message) {
        var msg = C.safeTrim(message || '');
        if (!msg) {
          els.errBox.classList.remove('show');
          els.errBox.textContent = '';
          return;
        }
        els.errBox.textContent = msg;
        els.errBox.classList.add('show');
      }

      var initLoadTicket = null;
      function beginInitLoading(message) {
        if (typeof window.beginPageLoading === 'function') {
          initLoadTicket = window.beginPageLoading(message || 'กำลังโหลดข้อมูล...');
          return;
        }
        if (typeof window.showPageLoader === 'function') {
          window.showPageLoader(message || 'กำลังโหลดข้อมูล...', false);
        }
      }

      function endInitLoading() {
        if (initLoadTicket && typeof window.endPageLoading === 'function') {
          window.endPageLoading(initLoadTicket);
          initLoadTicket = null;
          return;
        }
        if (typeof window.hidePageLoader === 'function') {
          window.hidePageLoader(false);
        }
      }

      function updateBrowserTitle(idValue) {
        var id = C.safeTrim(idValue || '');
        var page = id ? ('เปลี่ยนสถานะเอกสาร • ' + id) : 'เปลี่ยนสถานะเอกสาร';
        document.title = page + ' | ' + APP_BROWSER_NAME;
      }

      function setSaving(isSaving) {
        var active = !!isSaving;
        els.btnSubmit.disabled = active;
        els.loadingMsg.style.display = active ? 'block' : 'none';
        els.loadingMsg.setAttribute('aria-hidden', active ? 'false' : 'true');
      }

        var map = {};
        var list = Array.isArray(members) ? members : [];
        for (var i = 0; i < list.length; i++) {
          var m = list[i] || {};
          var name = C.safeTrim(m.name || '');
          var img = C.safeTrim(m.image || '');
          if (!name || !img) continue;
          map[name] = img;
          map[name.toLowerCase()] = img;
        }
        return map;
      }

      function normalizeSheetColorLabel(value) {
        var raw = C.safeTrim(value || '');
        if (!raw) return '';
        var compact = raw.toLowerCase().replace(/\s+/g, '').replace(/[.]/g, '');
        if (compact === 'ใบฟ้า' || compact === 'ฟ้า' || compact === 'ใบสีฟ้า' || compact === 'blue' || compact === 'lightblue') return 'ใบฟ้า';
        if (compact === 'ใบชมพู' || compact === 'ชมพู' || compact === 'ใบสีชมพู' || compact === 'pink') return 'ใบชมพู';
        if (compact === 'ใบเขียว' || compact === 'เขียว' || compact === 'ใบสีเขียว' || compact === 'green') return 'ใบเขียว';
        if (compact === 'อื่นๆ' || compact === 'อื่น' || compact === 'other') return 'อื่น ๆ';
        return raw;
      }

      function themeKeyFromSheetColor(value) {
        var label = normalizeSheetColorLabel(value);
        if (label === 'ใบชมพู') return 'pink';
        if (label === 'ใบเขียว') return 'green';
        if (label === 'อื่น ๆ') return 'other';
        return 'blue';
      }

      function applySheetTheme(value) {
        var body = document.body;
        var themes = ['sheet-theme-blue', 'sheet-theme-pink', 'sheet-theme-green', 'sheet-theme-other'];
        for (var i = 0; i < themes.length; i++) {
          body.classList.remove(themes[i]);
        }
        body.classList.add('sheet-theme-' + themeKeyFromSheetColor(value));
      }

      function sheetTypeBadge(label) {
        var normalized = normalizeSheetColorLabel(label);
        if (!normalized) return '';
        return '<span class="h-badge sheet-' + themeKeyFromSheetColor(normalized) + '"><i class="bi bi-file-earmark-text"></i>' + C.escapeHtml(normalized) + '</span>';
      }

      function sheetThemeConfirmColor() {
        var key = themeKeyFromSheetColor(state.doc && state.doc.sheetColor || '');
        if (key === 'pink') return '#db2777';
        if (key === 'green') return '#16a34a';
        if (key === 'other') return '#475569';
        return '#1f79f0';
      }

      function sheetThemeDenyColor() {
        var key = themeKeyFromSheetColor(state.doc && state.doc.sheetColor || '');
        if (key === 'pink') return '#9d174d';
        if (key === 'green') return '#166534';
        if (key === 'other') return '#334155';

      }

      function themedSwal(options) {
        var opts = options || {};
        var key = themeKeyFromSheetColor(state.doc && state.doc.sheetColor || '');
        var customClass = opts.customClass || {};
        var popupClass = 'sheet-popup-' + key;
        var popup = customClass.popup ? (customClass.popup + ' ' + popupClass) : popupClass;
        var mergedCustomClass = {};
        for (var k in customClass) {
          if (Object.prototype.hasOwnProperty.call(customClass, k)) mergedCustomClass[k] = customClass[k];
        }
        mergedCustomClass.popup = popup;

        var out = {};
        for (var keyName in opts) {
          if (Object.prototype.hasOwnProperty.call(opts, keyName)) out[keyName] = opts[keyName];
        }
        out.customClass = mergedCustomClass;
        if (!Object.prototype.hasOwnProperty.call(out, 'confirmButtonColor')) {
          out.confirmButtonColor = sheetThemeConfirmColor();
        }
        if (out.showDenyButton && !Object.prototype.hasOwnProperty.call(out, 'denyButtonColor')) {
          out.denyButtonColor = sheetThemeDenyColor();
        }
        return out;
      }

      function isIsoDateText(value) {
        return /^\d{4}-\d{2}-\d{2}$/.test(C.safeTrim(value || ''));
      }

      function isEmptyDateToken(value) {
        var text = C.safeTrim(value || '');
        if (!text) return true;
        return (
          text === '-' ||
          text === '--' ||
          text === '---' ||
          text === 'เลือกวันที่...' ||
          text.toLowerCase() === 'null' ||
          text.toLowerCase() === 'undefined'
        );
      }

      function parseThaiDisplayToIso(display) {
        var text = C.safeTrim(display || '').replace(/\s+/g, ' ');
        if (!text) return '';
        if (isIsoDateText(text)) return text;

        var slash = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if (slash) {
          var d1 = Number(slash[1]);
          var m1 = Number(slash[2]);
          var y1 = Number(slash[3]);
          if (y1 > 2400) y1 -= 543;
          if (y1 >= 1900 && m1 >= 1 && m1 <= 12 && d1 >= 1 && d1 <= 31) {
            return String(y1) + '-' + String(m1).padStart(2, '0') + '-' + String(d1).padStart(2, '0');
          }
        }

        var m = text.match(/^(\d{1,2})\s+([^\s]+)\s+(\d{4})$/);
        if (!m) return '';

        var day = Number(m[1]);
        var monthName = m[2];
        var year = Number(m[3]);
        var monthMap = {
          'มกราคม': 1, 'ม.ค.': 1,
          'กุมภาพันธ์': 2, 'ก.พ.': 2,
          'มีนาคม': 3, 'มี.ค.': 3,
          'เมษายน': 4, 'เม.ย.': 4,
          'พฤษภาคม': 5, 'พ.ค.': 5,
          'มิถุนายน': 6, 'มิ.ย.': 6,
          'กรกฎาคม': 7, 'ก.ค.': 7,
          'สิงหาคม': 8, 'ส.ค.': 8,
          'กันยายน': 9, 'ก.ย.': 9,
          'ตุลาคม': 10, 'ต.ค.': 10,
          'พฤศจิกายน': 11, 'พ.ย.': 11,
          'ธันวาคม': 12, 'ธ.ค.': 12
        };
        var month = monthMap[monthName] || 0;
        if (!month || !day || day > 31 || !year) return '';
        if (year > 2400) year -= 543;
        if (year < 1900) return '';

        return String(year) + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
      }

      function resolveStepDateValue(statusData, stepKey) {
        var iso = C.safeTrim((statusData && statusData[stepKey + 'Date']) || '');
        if (isIsoDateText(iso)) return iso;

        iso = C.safeTrim((statusData && statusData[stepKey + 'DateInput']) || '');
        if (isIsoDateText(iso)) return iso;

        var display = C.safeTrim((statusData && statusData[stepKey + 'DateDisplay']) || '');
        var parsed = parseThaiDisplayToIso(display);
        if (isIsoDateText(parsed)) return parsed;

        return '';
      }

      function buildEmptyStatusDraft() {
        return {
          returnCheck: false,
          returnDate: '',
          returnUser: '',
          receiveBackCheck: false,
          receiveBackDate: '',
          receiveBackUser: '',
          verifyCheck: false,
          verifyDate: '',
          verifyUser: '',
          bossCheck: false,
          bossDate: '',
          bossUser: '',
          signCheck: false,
          signDate: '',
          signUser: '',
          statusRemark: ''
        };
      }

      function formatStatusLogTimestamp(isoText) {
        var iso = C.safeTrim(isoText || '');
        if (!iso) return 'ไม่ระบุเวลา';

        var normalized = iso;
        var isDateOnlyInput = false;
        var ymd = normalized.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (ymd) {
          isDateOnlyInput = true;
          var yOnly = Number(ymd[1]);
          if (yOnly > 2400) yOnly -= 543;
          normalized = String(yOnly).padStart(4, '0') + '-' + ymd[2] + '-' + ymd[3] + 'T00:00:00+07:00';
        } else {
          var yearPrefix = normalized.match(/^(\d{4})([\s\S]*)$/);
          if (yearPrefix) {
            var y = Number(yearPrefix[1]);
            if (y > 2400) {
              normalized = String(y - 543) + yearPrefix[2];
            }
          }
          if (/^\d{4}-\d{2}-\d{2}T/.test(normalized) && !/(Z|[+\-]\d{2}:?\d{2})$/.test(normalized)) {
            normalized += '+07:00';
          }
        }

        var d = new Date(normalized);
        if (isNaN(d.getTime())) return iso;

        var dateText = new Intl.DateTimeFormat('th-TH-u-ca-buddhist', {
          timeZone: 'Asia/Bangkok',
          weekday: 'long',
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        }).format(d);

        if (isDateOnlyInput) {
          return dateText + ' เวลาไม่ระบุ';
        }

        var timeText = new Intl.DateTimeFormat('th-TH', {
          timeZone: 'Asia/Bangkok',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        }).format(d);

        return dateText + ' เวลา ' + timeText + ' น.';
      }

      function escapePlainText(value) {
        return C.escapeHtml(C.safeText(value || '').replace(/\s+/g, ' ').trim());
      }

      function getStepSavedCount(stepKey) {
        var stats = (state.statusStepStats && typeof state.statusStepStats === 'object') ? state.statusStepStats : {};
        var count = Number(stats[stepKey] || 0);
        if (!isFinite(count) || count < 0) count = 0;
        return Math.floor(count);
      }

      function sortStepLogsDesc(list) {
        return (Array.isArray(list) ? list.slice() : []).sort(function (a, b) {
          var sa = Number(a && a.seqNo || 0);
          var sb = Number(b && b.seqNo || 0);
          if (sa !== sb) return sb - sa;
          var ta = String(a && a.createdAtIso || '');
          var tb = String(b && b.createdAtIso || '');
          return tb.localeCompare(ta);
        });
      }

      function groupedStatusLogsByStep() {
        var logs = Array.isArray(state.statusStepLogs) ? state.statusStepLogs : [];
        var grouped = {};
        for (var i = 0; i < steps.length; i++) grouped[steps[i].key] = [];
        for (var j = 0; j < logs.length; j++) {
          var item = logs[j] || {};
          var key = C.safeTrim(item.stepKey || '');
          if (!key) continue;
          if (!grouped[key]) grouped[key] = [];
          grouped[key].push(item);
        }
        for (var k = 0; k < steps.length; k++) {
          var stepKey = steps[k].key;
          grouped[stepKey] = sortStepLogsDesc(grouped[stepKey]);
        }
        return grouped;
      }

      async function showAllHistoryPopup() {
        var grouped = groupedStatusLogsByStep();
        var html = '<div class="history-popup-content">';
        for (var i = 0; i < steps.length; i++) {
          var step = steps[i];
          var list = Array.isArray(grouped[step.key]) ? grouped[step.key] : [];
          var savedCount = getStepSavedCount(step.key);
          if (savedCount < list.length) savedCount = list.length;
          html += '<div class="history-popup-block">';
          html += '<p class="history-popup-title"><i class="bi ' + C.escapeHtml(step.icon) + '"></i> ' + C.escapeHtml(step.label) + ' • บันทึกแล้ว ' + String(savedCount) + ' ครั้ง</p>';
          if (!list.length) {
            html += '<p class="history-popup-line">ยังไม่เคยบันทึกสถานะนี้</p>';
          } else {
            for (var r = 0; r < list.length; r++) {
              var item = list[r] || {};
              var seq = Number(item.seqNo || (list.length - r));
              if (!isFinite(seq) || seq < 1) seq = (list.length - r);
              var eventDate = C.safeTrim(item.stepDateDisplay || '') || C.safeTrim(item.stepDateIso || '') || '-';
              var eventUser = C.safeTrim(item.stepUser || '') || '-';
              var recordedAtText = formatStatusLogTimestamp(item.createdAtIso || item.stepDateIso || '');
              html += '<p class="history-popup-line">ครั้งที่ ' + String(seq) + ' • วันที่: ' + C.escapeHtml(eventDate) + ' • ผู้ดำเนินการ: ' + C.escapeHtml(eventUser) + '</p>';
              html += '<p class="history-popup-line">บันทึกเมื่อ: ' + C.escapeHtml(recordedAtText) + '</p>';
              var note = C.safeTrim(item.statusRemark || '');
              if (note) {
                html += '<p class="history-popup-line">หมายเหตุ: ' + escapePlainText(note) + '</p>';
              }
            }
          }
          html += '</div>';
        }
        html += '</div>';

        await Swal.fire(themedSwal({
          icon: 'info',
          title: 'สรุปประวัติสถานะทั้งหมด',
          html: html,
          width: 820,
          confirmButtonText: 'ปิด'
        }));
      }

      function renderStatusLogHistory() {
        var grouped = groupedStatusLogsByStep();

        var totalSaved = 0;
        for (var s = 0; s < steps.length; s++) {
          var stepKey = steps[s].key;
          var stepCount = getStepSavedCount(stepKey);
          var stepLogs = Array.isArray(grouped[stepKey]) ? grouped[stepKey] : [];
          if (stepCount < stepLogs.length) stepCount = stepLogs.length;
          totalSaved += stepCount;
        }
        if (els.statusLogMeta) {
          els.statusLogMeta.innerHTML = '<i class="bi bi-journal-check me-1"></i>บันทึกสถานะสะสมทั้งหมด <strong>' + String(totalSaved) + '</strong> รายการ (นับแยกตามแต่ละสถานะ)';
        }
        if (els.btnShowHistoryAll) {
          var btnText = totalSaved > 0
            ? '<i class="bi bi-clock-history"></i>ดูประวัติทั้งหมด (' + String(totalSaved) + ')'
            : '<i class="bi bi-clock-history"></i>ดูประวัติทั้งหมด';
          els.btnShowHistoryAll.innerHTML = btnText;
        }
      }

      function memberSelectHtml(fieldId, currentVal, disabled) {
        var html = '<option value="">เลือกชื่อ...</option>';

        for (var i = 0; i < state.members.length; i++) {
          var m = state.members[i] || {};
          var name = C.safeTrim(m.name || '');
          if (!name) continue;
          var pos = C.safeTrim(m.position || '');
          var label = pos ? (name + ' (' + pos + ')') : name;
          html += '<option value="' + C.escapeHtml(name) + '"' + (selected === name ? ' selected' : '') + '>' + C.escapeHtml(label) + '</option>';
        }

        return '<select id="' + C.escapeHtml(fieldId) + '" class="form-select"' + (disabled ? ' disabled' : '') + '>' + html + '</select>';
      }

      function memberAvatarHtml(fieldId, memberName) {
        var key = C.safeTrim(memberName || '');
        var img = state.memberImgMap[key] || state.memberImgMap[key.toLowerCase()] || '';
        if (img) {
          return '<img src="' + C.escapeHtml(img) + '" alt="u">';
        }
        return '<i class="bi bi-person-fill"></i>';
      }

      function renderSteps() {
        var s = state.statusDraftData || buildEmptyStatusDraft();
        var html = '';

        for (var i = 0; i < steps.length; i++) {
          var step = steps[i];
          var checked = !!s[step.key + 'Check'];

          html += '<div class="step-title-wrap">';
          html += '<div class="step-title-row">';
          html += '<h4 class="form-section-title"><span class="step-index-badge">' + String(i + 1) + '</span><i class="bi ' + C.escapeHtml(step.icon) + '"></i>' + C.escapeHtml(step.label) + '</h4>';
          html += '<span class="step-count-chip">บันทึกแล้ว ' + String(stepSavedCount) + ' ครั้ง</span>';
          html += '</div>';
          html += '<p class="step-sub">เปิดสวิตช์เพื่อเพิ่มการบันทึกสถานะครั้งใหม่</p>';
          html += '</div>';
          html += '</div>';
          html += '<span id="' + step.key + 'State" class="step-state' + (checked ? ' on' : '') + '">' + (checked ? 'เปิดแล้ว' : 'ปิดอยู่') + '</span>';
          html += '</div>';

          html += '<div id="' + step.key + 'Detail" class="status-detail' + (checked ? '' : ' disabled') + '">';

          html += '<div class="status-field">';
          html += '<label class="form-label">วันที่</label>';
          html += '<div class="thai-date-input" onclick="if(document.getElementById(\'' + step.key + 'Check\').checked){openCalendar(\'' + step.key + 'Date\')}">';
          html += '<input type="hidden" id="' + step.key + 'Date" value="' + C.escapeHtml(dateVal) + '">';

          html += '<i class="bi bi-calendar3 cal-icon"></i>';
          html += '</div>';
          html += '</div>';

          html += '<label class="form-label">ชื่อผู้ดำเนินการ</label>';
          html += '<div class="member-select-wrap">';
          html += '<div id="' + step.key + 'UserImg" class="member-avatar-sm">' + memberAvatarHtml(step.key + 'User', userVal) + '</div>';
          html += memberSelectHtml(step.key + 'User', userVal, !checked);
          html += '</div>';
          html += '</div>';

          html += '</div>';
          html += '</section>';
        }

        els.stepsWrap.innerHTML = html;

        for (var j = 0; j < steps.length; j++) {
          (function bindStep(step) {
            var checkEl = document.getElementById(step.key + 'Check');
            var userEl = document.getElementById(step.key + 'User');
            if (checkEl) {
              checkEl.addEventListener('change', function () {
                toggleStep(step.key);
              });
            }
            if (userEl) {
              userEl.addEventListener('change', function () {
                updateMemberImage(step.key + 'User');
              });
            }
            var stepDateEl = document.getElementById(step.key + 'Date');
            if (typeof window.updDD === 'function' && stepDateEl) {
              window.updDD(step.key + 'Date');
            }
            updateStepStateUI(step.key);
          })(steps[j]);

      function updateMemberImage(fieldId) {
        var sel = document.getElementById(fieldId);
        var imgWrap = document.getElementById(fieldId + 'Img');
        if (!sel || !imgWrap) return;
        var name = C.safeTrim(sel.value || '');
        var img = state.memberImgMap[name] || state.memberImgMap[name.toLowerCase()] || '';
        if (img) {
          imgWrap.innerHTML = '<img src="' + C.escapeHtml(img) + '" alt="u">';
        } else {
          imgWrap.innerHTML = '<i class="bi bi-person-fill"></i>';
        }
      }

      function updateStepStateUI(key) {
        var checkEl = document.getElementById(key + 'Check');
        var stateEl = document.getElementById(key + 'State');
        var cardEl = document.getElementById(key + 'Card');
        var isOn = !!(checkEl && checkEl.checked);

        if (stateEl) {
          stateEl.textContent = isOn ? 'เปิดแล้ว' : 'ปิดอยู่';
          stateEl.classList.toggle('on', isOn);
        }
        if (cardEl) {
          cardEl.classList.toggle('active', isOn);
        }
      }

      function toggleStep(key) {
        var checkEl = document.getElementById(key + 'Check');
        var detailEl = document.getElementById(key + 'Detail');
        var dateEl = document.getElementById(key + 'Date');
        var userEl = document.getElementById(key + 'User');

        if (!checkEl || !detailEl || !dateEl || !userEl) return;

        if (checkEl.checked) {
          detailEl.classList.remove('disabled');
          userEl.disabled = false;
          if (!C.safeTrim(dateEl.value || '')) {
            var now = new Date();
            var mm = String(now.getMonth() + 1).padStart(2, '0');
            var dd = String(now.getDate()).padStart(2, '0');
            dateEl.value = now.getFullYear() + '-' + mm + '-' + dd;
          }
        } else {
          detailEl.classList.add('disabled');
          userEl.disabled = true;
        }

        if (typeof window.updDD === 'function') {
          window.updDD(key + 'Date');
        }

        updateStepStateUI(key);
      }

      function setAllSteps(enabled) {
        for (var i = 0; i < steps.length; i++) {
          var step = steps[i];
          var checkEl = document.getElementById(step.key + 'Check');
          if (!checkEl) continue;
          checkEl.checked = !!enabled;
          toggleStep(step.key);
        }
      }

      function getDateForSubmit(stepKey) {
        var input = document.getElementById(stepKey + 'Date');
        var value = C.safeTrim((input && input.value) || '');
        if (isIsoDateText(value)) return value;
        if (isEmptyDateToken(value)) return '';
        var fromState = resolveStepDateValue(state.statusDraftData || {}, stepKey);
        if (fromState) return fromState;
        var fallback = C.safeTrim(((state.statusDraftData || {})[stepKey + 'Date']) || ((state.statusDraftData || {})[stepKey + 'DateInput']) || '');
        return isIsoDateText(fallback) ? fallback : '';
      }

      function validateStatusData(statusData) {
        var data = statusData || {};
        for (var i = 0; i < steps.length; i++) {
          var step = steps[i];
          var checkKey = step.key + 'Check';
          var dateKey = step.key + 'Date';
          var userKey = step.key + 'User';
          if (!data[checkKey]) continue;

          var dateVal = C.safeTrim(data[dateKey] || '');
          var userVal = C.safeTrim(data[userKey] || '');

          if (!isIsoDateText(dateVal)) {
            return 'กรุณาเลือกวันที่ให้ครบในขั้นตอน "' + step.label + '"';
          }
          if (!userVal) {
            return 'กรุณาเลือกชื่อผู้ดำเนินการในขั้นตอน "' + step.label + '"';
          }
        }
        return '';
      }

          returnDate: getDateForSubmit('return'),
          returnUser: C.safeTrim((document.getElementById('returnUser') || {}).value || ''),
          receiveBackCheck: !!(document.getElementById('receiveBackCheck') || {}).checked,
          receiveBackDate: getDateForSubmit('receiveBack'),
          receiveBackUser: C.safeTrim((document.getElementById('receiveBackUser') || {}).value || ''),
          verifyCheck: !!(document.getElementById('verifyCheck') || {}).checked,
          verifyDate: getDateForSubmit('verify'),
          verifyUser: C.safeTrim((document.getElementById('verifyUser') || {}).value || ''),
          bossCheck: !!(document.getElementById('bossCheck') || {}).checked,
          bossDate: getDateForSubmit('boss'),
          bossUser: C.safeTrim((document.getElementById('bossUser') || {}).value || ''),
          signCheck: !!(document.getElementById('signCheck') || {}).checked,
          signDate: getDateForSubmit('sign'),

          statusRemark: C.safeText((els.statusRemark && els.statusRemark.value) || '').trim(),

      async function submitStatus() {
        if (!state.user || state.user.isReadOnly || state.user.canEdit === false) {
          C.redirect('access-denied.html', {
            message: 'บัญชีผู้มีสิทธิ์อ่าน ไม่สามารถจัดการสถานะเอกสารได้'
          }, true);
          return;
        }

        var statusData = collectStatusData();
        var invalidMessage = validateStatusData(statusData);
        if (invalidMessage) {
          await Swal.fire(themedSwal({
            icon: 'warning',
            title: 'ข้อมูลไม่ครบ',
            text: invalidMessage
          }));
          return;
        }

        setSaving(true);
        var nextDocId = state.doc.docId || docId;
        var saveResult = null;
        try {
          saveResult = await state.api.docUpdateStatus(nextDocId, statusData);
          if (!saveResult || saveResult.success === false) {
            throw new Error((saveResult && saveResult.error) ? saveResult.error : 'ไม่สามารถบันทึกสถานะได้');
          }
        } catch (err) {
          await Swal.fire(themedSwal({
            icon: 'error',
            title: 'เกิดข้อผิดพลาด',
            text: (err && err.message) ? err.message : 'บันทึกไม่สำเร็จ'
          }));
          return;
        } finally {
          setSaving(false);
        }

        if (saveResult && Array.isArray(saveResult.statusStepLogs)) {
          state.statusStepLogs = saveResult.statusStepLogs;
        } else if (saveResult && Array.isArray(saveResult.appended) && saveResult.appended.length) {
          state.statusStepLogs = (Array.isArray(state.statusStepLogs) ? state.statusStepLogs : []).concat(saveResult.appended);
        }
        if (saveResult && saveResult.statusStepStats && typeof saveResult.statusStepStats === 'object') {
          state.statusStepStats = saveResult.statusStepStats;
        }
        if (saveResult && saveResult.statusData) {
          state.statusData = saveResult.statusData;
        }

        state.statusDraftData = buildEmptyStatusDraft();

        renderStatusLogHistory();
        renderSteps();
        if (els.statusRemark) els.statusRemark.value = '';

        var appended = Array.isArray(saveResult && saveResult.appended) ? saveResult.appended : [];
        var savedSummary = appended.map(function (item) {
          var label = C.safeTrim((item && item.stepLabel) || '');
          var seq = Number((item && item.seqNo) || 0);
          if (!isFinite(seq) || seq < 1) return label || '-';
          return (label || '-') + ' ครั้งที่ ' + String(seq);
        }).join(' | ');
        if (!savedSummary) savedSummary = 'บันทึกสถานะที่เลือกแล้ว';

        var action = await Swal.fire(themedSwal({
          icon: 'success',
          title: 'บันทึกสถานะสำเร็จ',
          text: savedSummary,
          confirmButtonText: 'บันทึกต่อ',
          showDenyButton: true,
          denyButtonText: 'ดูรายละเอียดเอกสาร',
          allowOutsideClick: false
        }));

        if (action && action.isDenied) {
          C.redirect('document-view.html', { id: nextDocId }, true);
        }
      }

      async function loadData() {
        showError('');

        var res = await Promise.all([
          state.api.me(),
          state.api.docDetail(docId),
          state.api.optionsMembers()
        ]);

        var meRes = res[0] || {};
        var docRes = res[1] || {};
        var memberRes = res[2] || {};

        if (!meRes || meRes.success === false || !meRes.user) {
          C.redirect('index.html', {}, true);
          return false;
        }
        if (!docRes || docRes.success === false || !docRes.doc) {
          C.redirect('not-found.html', {
            message: 'ไม่พบเอกสาร',
            detail: docId,
            back: 'index.html'
          }, true);
          return false;
        }

        state.user = meRes.user;
        state.doc = docRes.doc;
        state.statusData = docRes.statusData || {};
        state.statusStepLogs = Array.isArray(docRes.statusStepLogs) ? docRes.statusStepLogs : [];
        state.statusStepStats = (docRes.statusStepStats && typeof docRes.statusStepStats === 'object') ? docRes.statusStepStats : {};
        state.members = (memberRes && Array.isArray(memberRes.data)) ? memberRes.data : [];
        state.memberImgMap = mapMemberImages(state.members);
        state.statusDraftData = buildEmptyStatusDraft();
        updateBrowserTitle(state.doc.docId || docId);
        applySheetTheme(state.doc.sheetColor || '');

        if (state.user.isReadOnly || state.user.canEdit === false) {
          C.redirect('access-denied.html', {
            message: 'บัญชีผู้มีสิทธิ์อ่าน ไม่สามารถจัดการสถานะเอกสารได้'
          }, true);
          return false;
        }

        var headText = (state.doc.docId || '-') + ' | เลขรับ ' + (state.doc.receiveNo || '-');
        els.docHead.textContent = headText;
        if (els.headerBadges) els.headerBadges.innerHTML = sheetTypeBadge(state.doc.sheetColor || '');

        renderStatusLogHistory();
        renderSteps();
        if (els.statusRemark) els.statusRemark.value = '';

        els.mainCard.style.display = 'block';
        return true;
      }

      function bindEvents() {
        els.btnBack.addEventListener('click', function () {
          C.redirect('document-view.html', { id: docId });
        });

        window.addEventListener('pageshow', function () {
          setSaving(false);
        });

        if (els.btnEnableAll) {
          els.btnEnableAll.addEventListener('click', function () {
            setAllSteps(true);
          });
        }

        if (els.btnDisableAll) {
          els.btnDisableAll.addEventListener('click', function () {
            setAllSteps(false);
          });
        }

        if (els.btnShowHistoryAll) {
          els.btnShowHistoryAll.addEventListener('click', function () {
            showAllHistoryPopup();
          });
        }

        els.btnSubmit.addEventListener('click', submitStatus);
      }

      async function init() {
        beginInitLoading('กำลังโหลดหน้าจัดการสถานะ...');
        try {
          if (!docId) {
            C.redirect('not-found.html', {
              message: 'ไม่พบเอกสาร',
              detail: '',
              back: 'index.html'
            }, true);
            return;
          }

          try {
            state.settings = C.ensureSettingsOrThrow();
            state.api = C.createApiClient(state.settings);
          } catch (_e) {
            showError('กรุณาตั้งค่า scriptUrl และ deviceKey ที่หน้า index ก่อน');
            return;
          }

          bindEvents();
          updateBrowserTitle(docId);
          setSaving(false);

          try {
            await loadData();
          } catch (err) {
            showError((err && err.message) ? err.message : 'โหลดหน้าจัดการสถานะไม่สำเร็จ');
          }
        } finally {
          endInitLoading();
        }
      }

      init();
    })();
  </script>
</body>
</html>
