<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ตรวจสอบผลงาน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="./theme-legacy.css?v=20260317-6">
  <style>
    .insp-page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 16px;
      --ins-control-height: 52px;
      --ins-adv-control-height: 60px;
    }

    .insp-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .back-btn {
      border: 1px solid var(--input-border);
      background: var(--card-bg);
      color: var(--text-color);
      min-height: 40px;
      border-radius: 999px;
      font-weight: 760;
      padding: 0 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      text-decoration: none;
    }

    .back-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(10, 132, 255, 0.45);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.14);
    }

    .hero {
      text-align: center;
      margin-bottom: 12px;
    }

    .hero-icon {
      width: 66px;
      height: 66px;
      border-radius: 20px;
      margin: 0 auto 12px;
      background: linear-gradient(145deg, #66baff 0%, #3196fb 42%, #1f79f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.7rem;
      box-shadow: 0 18px 36px rgba(10, 132, 255, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.38);
    }

    .hero h1 {
      margin: 0;
      font-size: 1.42rem;
      font-weight: 840;
      color: var(--text-color);
    }

    .hero-sub {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 620;
    }

    .inspector-card {
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 22px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(248, 252, 255, 0.68));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.84), 0 14px 28px rgba(15, 23, 42, 0.08);
    }

    .filter-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: 840;
      color: var(--text-color);
      margin-bottom: 10px;
    }

    .row {
      display: grid;
      gap: 10px;
    }

    .row.three {
      grid-template-columns: minmax(0, 2fr) minmax(0, 1fr) 184px;
      align-items: end;
    }

    .form-label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.8rem;
      font-weight: 760;
      color: var(--text-muted);
    }

    .page-inspector .form-control,
    .page-inspector .form-select {
      width: 100%;
      min-height: var(--ins-control-height);
      height: var(--ins-control-height);
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.34);
      background-color: #ffffff;
      color: var(--text-color);
      font: inherit;
      font-size: 1rem;
      line-height: 1.2;
      padding: 0 16px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      font-weight: 600;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86);
    }

    .form-control:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px var(--primary-color-soft);
    }

    .page-inspector .form-select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding-right: 42px;
      background-image: var(--dd-arrow-light);
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 14px 14px;
    }

    .page-inspector input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .page-inspector input[type="number"]::-webkit-outer-spin-button,
    .page-inspector input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .page-inspector .search-btn,
    .page-inspector .print-btn,
    .page-inspector .adv-btn,
    .page-inspector .light-btn {
      border: 1px solid rgba(148, 163, 184, 0.34);
      border-radius: 999px;
      min-height: var(--ins-control-height);
      height: var(--ins-control-height);
      padding: 0 18px;
      font: inherit;
      font-weight: 820;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: transform 0.24s ease, box-shadow 0.28s ease, border-color 0.22s ease;
      backdrop-filter: blur(14px) saturate(170%);
      -webkit-backdrop-filter: blur(14px) saturate(170%);
    }

    .page-inspector .search-btn {
      color: #fff;
      border-color: rgba(10, 132, 255, 0.34);
      background: linear-gradient(180deg, rgba(68, 165, 255, 0.96), rgba(10, 132, 255, 0.96), rgba(0, 113, 227, 0.96));
      box-shadow: 0 12px 28px rgba(10, 132, 255, 0.26);
      min-width: 0;
      width: 100%;
      border-radius: 16px !important;
    }

    .page-inspector .row.three > .search-btn {
      align-self: end;
    }

    .search-btn:hover,
    .print-btn:hover,
    .adv-btn:hover {
      transform: translateY(-1px);
    }

    .adv-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .adv-btn {
      border: 1px solid rgba(37, 99, 235, 0.42);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(228, 242, 255, 0.72));
      color: #0c4a6e;
      box-shadow: 0 10px 22px rgba(10, 132, 255, 0.14);
    }

    .adv-badge {
      display: none;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 0.77rem;
      font-weight: 780;
      background: rgba(10, 132, 255, 0.14);
      border: 1px solid rgba(10, 132, 255, 0.32);
      color: #075985;
    }

    .stat-box {
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(145deg, rgba(10, 132, 255, 0.16), rgba(10, 132, 255, 0.07));
      border: 1px solid rgba(10, 132, 255, 0.22);
      text-align: center;
    }

    .stat-head {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .stat-number {
      font-size: 2.4rem;
      font-weight: 900;
      line-height: 1;
      color: #007aff;
    }

    .stat-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(10, 132, 255, 0.26);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
      display: none;
    }

    .dashboard-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .dashboard-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 860;
      color: var(--text-color);
      margin-bottom: 4px;
    }

    .dashboard-hint {
      font-size: 0.82rem;
      line-height: 1.45;
      font-weight: 680;
      color: var(--text-muted);
    }

    .dashboard-summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .dashboard-metric {
      border-radius: 20px;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
      min-height: 116px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .dashboard-metric-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .dashboard-metric-label {
      font-size: 0.8rem;
      font-weight: 780;
      line-height: 1.35;
      color: var(--text-muted);
    }

    .dashboard-metric-icon {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      flex: 0 0 auto;
    }

    .dashboard-metric-value {
      font-size: 2.05rem;
      line-height: 0.96;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--text-color);
    }

    .dashboard-metric-sub {
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text-muted);
    }

    .metric-blue {
      background: linear-gradient(145deg, rgba(191, 219, 254, 0.78), rgba(255, 255, 255, 0.9));
      border-color: rgba(59, 130, 246, 0.26);
    }

    .metric-blue .dashboard-metric-icon {
      background: rgba(59, 130, 246, 0.14);
      color: #1d4ed8;
    }

    .metric-blue .dashboard-metric-value {
      color: #1d4ed8;
    }

    .metric-emerald {
      background: linear-gradient(145deg, rgba(187, 247, 208, 0.78), rgba(255, 255, 255, 0.9));
      border-color: rgba(34, 197, 94, 0.28);
    }

    .metric-emerald .dashboard-metric-icon {
      background: rgba(34, 197, 94, 0.14);
      color: #15803d;
    }

    .metric-emerald .dashboard-metric-value {
      color: #15803d;
    }

    .metric-violet {
      background: linear-gradient(145deg, rgba(233, 213, 255, 0.82), rgba(255, 255, 255, 0.92));
      border-color: rgba(168, 85, 247, 0.28);
    }

    .metric-violet .dashboard-metric-icon {
      background: rgba(168, 85, 247, 0.14);
      color: #7c3aed;
    }

    .metric-violet .dashboard-metric-value {
      color: #7c3aed;
    }

    .metric-amber {
      background: linear-gradient(145deg, rgba(253, 230, 138, 0.8), rgba(255, 255, 255, 0.9));
      border-color: rgba(245, 158, 11, 0.28);
    }

    .metric-amber .dashboard-metric-icon {
      background: rgba(245, 158, 11, 0.14);
      color: #d97706;
    }

    .metric-amber .dashboard-metric-value {
      color: #d97706;
    }

    .dashboard-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
    }

    .dashboard-panel {
      border-radius: 22px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(246, 251, 255, 0.72));
      padding: 16px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82), 0 12px 26px rgba(15, 23, 42, 0.06);
    }

    .dashboard-panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .dashboard-panel-head h3 {
      margin: 0 0 4px;
      font-size: 1rem;
      font-weight: 840;
      color: var(--text-color);
    }

    .dashboard-panel-head p {
      margin: 0;
      font-size: 0.8rem;
      line-height: 1.4;
      font-weight: 680;
      color: var(--text-muted);
    }

    .dashboard-count-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      background: rgba(10, 132, 255, 0.12);
      border: 1px solid rgba(10, 132, 255, 0.24);
      color: #0369a1;
      white-space: nowrap;
    }

    .dashboard-spotlight {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.16), rgba(59, 130, 246, 0) 46%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(246, 251, 255, 0.75));
      display: grid;
      gap: 14px;
    }

    .dashboard-spotlight::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      right: -72px;
      top: -92px;
      background: rgba(59, 130, 246, 0.12);
      pointer-events: none;
    }

    .dashboard-kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.22);
      font-size: 0.78rem;
      font-weight: 800;
      color: #1d4ed8;
      margin-bottom: 12px;
    }

    .dashboard-top-purpose {
      margin: 0 0 6px;
      font-size: 1.22rem;
      line-height: 1.35;
      font-weight: 860;
      color: var(--text-color);
      word-break: break-word;
    }

    .dashboard-top-shell {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(180px, auto);
      gap: 18px;
      align-items: start;
      position: relative;
      z-index: 1;
    }

    .dashboard-top-content {
      min-width: 0;
    }

    .dashboard-top-stat {
      min-width: 0;
      text-align: right;
      display: grid;
      gap: 6px;
      align-content: start;
      justify-items: end;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(59, 130, 246, 0.18);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.84);
    }

    .dashboard-top-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .dashboard-top-count {
      font-size: 2.2rem;
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #1d4ed8;
    }

    .dashboard-top-percent {
      font-size: 0.9rem;
      line-height: 1.35;
      font-weight: 820;
      color: #475569;
    }

    .dashboard-top-caption {
      font-size: 0.8rem;
      line-height: 1.35;
      font-weight: 760;
      color: var(--text-muted);
    }

    .dashboard-top-foot {
      display: grid;
      gap: 8px;
      font-size: 0.82rem;
      line-height: 1.45;
      color: var(--text-muted);
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .dashboard-flow-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
      position: relative;
      z-index: 1;
    }

    .dashboard-flow-card {
      border-radius: 18px;
      padding: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(255, 255, 255, 0.72);
    }

    .dashboard-flow-card i {
      font-size: 1rem;
      margin-bottom: 8px;
      display: inline-flex;
    }

    .dashboard-flow-card .flow-label {
      font-size: 0.8rem;
      font-weight: 780;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: block;
    }

    .dashboard-flow-card .flow-value {
      font-size: 1.56rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--text-color);
    }

    .dashboard-flow-card.flow-verify i,
    .dashboard-flow-card.flow-verify .flow-value {
      color: #15803d;
    }

    .dashboard-flow-card.flow-boss i,
    .dashboard-flow-card.flow-boss .flow-value {
      color: #7c3aed;
    }

    .purpose-summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .purpose-card {
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(248, 252, 255, 0.72));
      padding: 12px 13px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.84);
      display: grid;
      gap: 8px;
    }

    .purpose-card.sheet-blue {
      border-color: rgba(59, 130, 246, 0.26);
      background: linear-gradient(180deg, rgba(239, 246, 255, 0.92), rgba(219, 234, 254, 0.72));
    }

    .purpose-card.sheet-pink {
      border-color: rgba(236, 72, 153, 0.26);
      background: linear-gradient(180deg, rgba(253, 242, 248, 0.94), rgba(251, 207, 232, 0.72));
    }

    .purpose-card.sheet-green {
      border-color: rgba(34, 197, 94, 0.26);
      background: linear-gradient(180deg, rgba(240, 253, 244, 0.94), rgba(187, 247, 208, 0.72));
    }

    .purpose-card.sheet-other {
      border-color: rgba(100, 116, 139, 0.24);
      background: linear-gradient(180deg, rgba(248, 250, 252, 0.94), rgba(226, 232, 240, 0.76));
    }

    .purpose-card-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 10px;
    }

    .purpose-card-main {
      min-width: 0;
    }

    .purpose-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .purpose-card-title {
      margin: 0;
      font-size: 0.88rem;
      line-height: 1.4;
      font-weight: 820;
      color: var(--text-color);
      word-break: break-word;
    }

    .purpose-card-stat {
      min-width: 62px;
      text-align: right;
      display: grid;
      gap: 2px;
      align-content: center;
    }

    .purpose-card-count {
      font-size: 1.4rem;
      line-height: 1;
      font-weight: 900;
      color: var(--text-color);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .purpose-card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-top: 2px;
      flex-wrap: wrap;
    }

    .purpose-progress {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.18);
      overflow: hidden;
    }

    .purpose-progress-bar {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(59, 130, 246, 0.78), rgba(29, 78, 216, 0.92));
    }

    .purpose-card.sheet-pink .purpose-progress-bar {
      background: linear-gradient(90deg, rgba(236, 72, 153, 0.78), rgba(190, 24, 93, 0.92));
    }

    .purpose-card.sheet-green .purpose-progress-bar {
      background: linear-gradient(90deg, rgba(34, 197, 94, 0.78), rgba(21, 128, 61, 0.92));
    }

    .purpose-card.sheet-other .purpose-progress-bar {
      background: linear-gradient(90deg, rgba(100, 116, 139, 0.74), rgba(71, 85, 105, 0.92));
    }

    .purpose-percent {
      font-size: 0.72rem;
      font-weight: 760;
      color: var(--text-muted);
    }

    .sheet-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 800;
      line-height: 1.1;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(255, 255, 255, 0.82);
      color: #475569;
      white-space: nowrap;
    }

    .sheet-pill.sheet-blue {
      background: rgba(191, 219, 254, 0.8);
      border-color: rgba(59, 130, 246, 0.34);
      color: #1d4ed8;
    }

    .sheet-pill.sheet-pink {
      background: rgba(251, 207, 232, 0.82);
      border-color: rgba(236, 72, 153, 0.34);
      color: #be185d;
    }

    .sheet-pill.sheet-green {
      background: rgba(187, 247, 208, 0.82);
      border-color: rgba(34, 197, 94, 0.34);
      color: #15803d;
    }

    .sheet-pill.sheet-other {
      background: rgba(226, 232, 240, 0.9);
      border-color: rgba(100, 116, 139, 0.28);
      color: #475569;
    }

    .chip.teal {
      background: rgba(20, 184, 166, 0.14);
      border-color: rgba(13, 148, 136, 0.32);
      color: #0f766e;
    }

    .chip.violet {
      background: rgba(168, 85, 247, 0.14);
      border-color: rgba(147, 51, 234, 0.28);
      color: #7c3aed;
    }

    .dashboard-empty {
      text-align: center;
      padding: 20px 14px;
      border-radius: 18px;
      border: 1px dashed rgba(148, 163, 184, 0.3);
      background: rgba(255, 255, 255, 0.62);
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 700;
      line-height: 1.5;
    }

    .docs-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: 840;
      color: var(--text-color);
    }

    .print-btn {
      color: #fff;
      border-color: rgba(34, 197, 94, 0.34);

        <p style="margin:0;">เลือกเจ้าหน้าที่และคลิก "ค้นหา" เพื่อดูรายงานผลงาน</p>
      </div>
    </div>

    <div id="printSection" style="display:none;">
      <h2 style="text-align:center;margin-bottom:4px;">รายงานผลงานการตรวจสอบเอกสาร</h2>
      <p id="printSubtitle" style="text-align:center;margin-top:0;font-size:14px;"></p>
    </div>

  <script src="./config.js"></script>
  <script src="./api-client.js?v=20260318-2"></script>
  <script src="./theme-legacy.js?v=20260221-3"></script>
  <script src="./app-common.js?v=20260317-1"></script>
  <script>
    (function () {
      'use strict';

      var C = window.DocFrontendCommon;

      var state = {
        settings: null,
        api: null,
        members: [],
        memberImgMap: {},
        currentData: [],
        currentDashboard: null,
        hasSearched: false,
        reportReqId: 0,
        reportTimeout: null,
        advFilters: {
          officer: '',
          selectedFiscalYears: [],
          startDate: '',
          endDate: '',
          startDateText: '',
          endDateText: '',
          startTime: '',
          endTime: '',
          group: ''
        }
      };

      var els = {
        mainCard: document.getElementById('mainCard'),
        btnBack: document.getElementById('btnBack'),
        mainOfficer: document.getElementById('mainOfficer'),
        mainFiscal: document.getElementById('mainFiscal'),
        btnSearchInspector: document.getElementById('btnSearchInspector'),
        btnAdvFilter: document.getElementById('btnAdvFilter'),
        activeFilterBadge: document.getElementById('activeFilterBadge'),
        statArea: document.getElementById('statArea'),
        dashboardArea: document.getElementById('dashboardArea'),
        dashboardGrid: document.getElementById('dashboardGrid'),
        dashboardHint: document.getElementById('dashboardHint'),
        officerImg: document.getElementById('officerImg'),
        totalCount: document.getElementById('totalCount'),
        officerName: document.getElementById('officerName'),
        fiscalYear: document.getElementById('fiscalYear'),
        docsList: document.getElementById('docsList'),
        btnPrint: document.getElementById('btnPrint'),
        printSubtitle: document.getElementById('printSubtitle')
      };

      var initLoadTicket = null;
      function beginInitLoading(message) {
        if (typeof window.beginPageLoading === 'function') {
          initLoadTicket = window.beginPageLoading(message || 'กำลังโหลดข้อมูล...');
          return;
        }
        if (typeof window.showPageLoader === 'function') {
          window.showPageLoader(message || 'กำลังโหลดข้อมูล...', false);
        }
      }

      function endInitLoading() {
        if (initLoadTicket && typeof window.endPageLoading === 'function') {
          window.endPageLoading(initLoadTicket);
          initLoadTicket = null;
          return;
        }
        if (typeof window.hidePageLoader === 'function') {
          window.hidePageLoader(false);
        }
      }

      function esc(v) {
        return C.escapeHtml(v == null ? '' : String(v));
      }

      function normalizeSheetColorLabel(value) {
        var raw = C.safeTrim(value || '');
        if (!raw) return '';
        var compact = raw.toLowerCase().replace(/\s+/g, '').replace(/[.]/g, '');
        if (compact === 'ใบฟ้า' || compact === 'ฟ้า' || compact === 'ใบสีฟ้า' || compact === 'blue' || compact === 'lightblue') return 'ใบฟ้า';
        if (compact === 'ใบชมพู' || compact === 'ชมพู' || compact === 'ใบสีชมพู' || compact === 'pink') return 'ใบชมพู';
        if (compact === 'ใบเขียว' || compact === 'เขียว' || compact === 'ใบสีเขียว' || compact === 'green') return 'ใบเขียว';
        if (compact === 'อื่นๆ' || compact === 'อื่น' || compact === 'other') return 'อื่น ๆ';
        return raw;
      }

      function getSheetColorClass(value) {
        var label = normalizeSheetColorLabel(value);
        if (label === 'ใบฟ้า') return 'sheet-blue';
        if (label === 'ใบชมพู') return 'sheet-pink';
        if (label === 'ใบเขียว') return 'sheet-green';
        return 'sheet-other';
      }

      function getSheetColorOrder(value) {
        var label = normalizeSheetColorLabel(value);
        if (label === 'ใบฟ้า') return 0;
        if (label === 'ใบชมพู') return 1;
        if (label === 'ใบเขียว') return 2;
        return 3;
      }

      function sortPurposeSummary(items) {
        var list = Array.isArray(items) ? items.slice() : [];
        list.sort(function (a, b) {
          var colorDiff = getSheetColorOrder((a && a.sheetColor) || '') - getSheetColorOrder((b && b.sheetColor) || '');
          if (colorDiff !== 0) return colorDiff;
          var countDiff = Number((b && b.count) || 0) - Number((a && a.count) || 0);
          if (countDiff !== 0) return countDiff;
          return String((a && a.purpose) || '').localeCompare(String((b && b.purpose) || ''), 'th');
        });
        return list;
      }

      function pickTopPurpose(items) {
        var list = Array.isArray(items) ? items : [];
        var top = null;
        for (var i = 0; i < list.length; i++) {
          var item = list[i] || {};
          if (!top) {
            top = item;
            continue;
          }
          var itemCount = Number(item.count || 0);
          var topCount = Number(top.count || 0);
          if (itemCount > topCount) {
            top = item;
            continue;
          }
          if (itemCount === topCount) {
            var colorDiff = getSheetColorOrder(item.sheetColor || '') - getSheetColorOrder(top.sheetColor || '');
            if (colorDiff < 0) {
              top = item;
              continue;
            }
            if (colorDiff === 0 && String(item.purpose || '').localeCompare(String(top.purpose || ''), 'th') < 0) {
              top = item;
            }
          }
        }
        return top;
      }

      function buildSheetPill(value) {
        var label = normalizeSheetColorLabel(value);
        if (!label) return '';
        return '<span class="sheet-pill ' + getSheetColorClass(label) + '">' + esc(label) + '</span>';
      }

      function formatPercent(value) {
        var num = Number(value || 0);
        if (!isFinite(num)) num = 0;
        var rounded = Math.round(num * 10) / 10;
        var isInt = Math.abs(rounded - Math.round(rounded)) < 0.01;
        return (isInt ? String(Math.round(rounded)) : rounded.toFixed(1)) + '%';
      }

      function buildDashboardFallback(documents) {
        var docs = Array.isArray(documents) ? documents : [];
        var purposeMap = {};
        var verifyCount = 0;
        var bossCount = 0;
        var latestVerifyDate = '';

        for (var i = 0; i < docs.length; i++) {
          var doc = docs[i] || {};
          var workflowStep = C.safeTrim(doc.workflowStep || '');
          var purposeLabel = C.safeTrim(doc.purpose || '') || 'ไม่ระบุวัตถุประสงค์';
          var sheetColor = normalizeSheetColorLabel(doc.sheetColor || '') || 'อื่น ๆ';

          if (workflowStep === 'ตรวจสอบ') verifyCount++;
          if (workflowStep === 'หัวหน้าผ่านงาน') bossCount++;
          if (!latestVerifyDate && C.safeTrim(doc.verifyDate || '')) latestVerifyDate = C.safeTrim(doc.verifyDate || '');

          if (!purposeMap[purposeLabel]) {
            purposeMap[purposeLabel] = {
              purpose: purposeLabel,
              count: 0,
              sheetColor: sheetColor
            };
          }
          purposeMap[purposeLabel].count++;
        }

        var purposeSummary = [];
        for (var key in purposeMap) {
          if (!Object.prototype.hasOwnProperty.call(purposeMap, key)) continue;
          var item = purposeMap[key];
          purposeSummary.push({
            purpose: item.purpose,
            count: Number(item.count || 0),
            sheetColor: item.sheetColor || 'อื่น ๆ',
            percentage: docs.length ? (Number(item.count || 0) / docs.length) * 100 : 0
          });
        }

        purposeSummary = sortPurposeSummary(purposeSummary);

        return {
          totalDocuments: docs.length,
          uniquePurposes: purposeSummary.length,
          verifyCount: verifyCount,
          bossCount: bossCount,
          latestVerifyDate: latestVerifyDate,
          topPurpose: pickTopPurpose(purposeSummary),
          purposeSummary: purposeSummary
        };
      }

      function buildDashboardHtml(dashboard, options) {
        dashboard = dashboard || {};
        options = options || {};

        var totalDocuments = Number(dashboard.totalDocuments || 0);
        var uniquePurposes = Number(dashboard.uniquePurposes || 0);
        var verifyCount = Number(dashboard.verifyCount || 0);
        var bossCount = Number(dashboard.bossCount || 0);
        var latestVerifyDate = C.safeTrim(dashboard.latestVerifyDate || '') || '-';
        var purposeSummary = sortPurposeSummary(Array.isArray(dashboard.purposeSummary) ? dashboard.purposeSummary : []);
        var topPurpose = pickTopPurpose(purposeSummary);
        var summaryText = C.safeTrim(options.summaryText || '');

        var html = '';
        html += '<div class="dashboard-summary-grid">';
        html += '<div class="dashboard-metric metric-blue"><div class="dashboard-metric-head"><div class="dashboard-metric-label">เอกสารทั้งหมด</div><span class="dashboard-metric-icon"><i class="bi bi-files"></i></span></div><div class="dashboard-metric-value">' + esc(totalDocuments) + '</div><div class="dashboard-metric-sub">ฉบับที่ตรงกับผลค้นหาปัจจุบัน</div></div>';
        html += '<div class="dashboard-metric metric-amber"><div class="dashboard-metric-head"><div class="dashboard-metric-label">วัตถุประสงค์</div><span class="dashboard-metric-icon"><i class="bi bi-tags"></i></span></div><div class="dashboard-metric-value">' + esc(uniquePurposes) + '</div><div class="dashboard-metric-sub">ประเภทวัตถุประสงค์ที่พบ</div></div>';
        html += '<div class="dashboard-metric metric-emerald"><div class="dashboard-metric-head"><div class="dashboard-metric-label">ขั้นตรวจสอบ</div><span class="dashboard-metric-icon"><i class="bi bi-search"></i></span></div><div class="dashboard-metric-value">' + esc(verifyCount) + '</div><div class="dashboard-metric-sub">เอกสารที่บันทึกในขั้นตรวจสอบ</div></div>';
        html += '<div class="dashboard-metric metric-violet"><div class="dashboard-metric-head"><div class="dashboard-metric-label">ขั้นหัวหน้าผ่านงาน</div><span class="dashboard-metric-icon"><i class="bi bi-person-check"></i></span></div><div class="dashboard-metric-value">' + esc(bossCount) + '</div><div class="dashboard-metric-sub">เอกสารที่บันทึกในขั้นหัวหน้าผ่านงาน</div></div>';
        html += '</div>';

        html += '<div class="dashboard-layout">';
        html += '<section class="dashboard-panel dashboard-spotlight">';
        html += '<div class="dashboard-kicker"><i class="bi bi-stars"></i>วัตถุประสงค์เด่น</div>';
        if (topPurpose) {
          var topCount = Number(topPurpose.count || 0);
          var topPercent = topPurpose.percentage != null ? topPurpose.percentage : (totalDocuments ? (topCount / totalDocuments) * 100 : 0);
          html += '<div class="dashboard-top-shell">';
          html += '<div class="dashboard-top-content">';
          html += '<div class="dashboard-top-meta">' + buildSheetPill(topPurpose.sheetColor || '') + '</div>';
          html += '<h3 class="dashboard-top-purpose">' + esc(topPurpose.purpose || '-') + '</h3>';
          html += '<div class="purpose-percent">วัตถุประสงค์ที่มีจำนวนเอกสารสูงสุดจากผลค้นหาปัจจุบัน</div>';
          html += '</div>';
          html += '<div class="dashboard-top-stat"><div class="dashboard-top-count">' + esc(topCount) + '</div><div class="dashboard-top-percent">คิดเป็น ' + esc(formatPercent(topPercent)) + ' ของเอกสารทั้งหมด</div><div class="dashboard-top-caption">จำนวนเอกสารในวัตถุประสงค์นี้</div></div>';
          html += '</div>';
        } else {
          html += '<div class="dashboard-empty">ยังไม่มีข้อมูลวัตถุประสงค์ในช่วงที่ค้นหา</div>';
        }
        html += '<div class="dashboard-top-foot">';
        if (summaryText) html += '<div><i class="bi bi-funnel me-1"></i>' + esc(summaryText) + '</div>';
        html += '<div><i class="bi bi-calendar-check me-1"></i>วันที่ตรวจสอบล่าสุด: ' + esc(latestVerifyDate) + '</div>';
        html += '</div>';
        html += '<div class="dashboard-flow-grid">';
        html += '<div class="dashboard-flow-card flow-verify"><i class="bi bi-search"></i><span class="flow-label">ตรวจสอบ</span><div class="flow-value">' + esc(verifyCount) + '</div></div>';
        html += '<div class="dashboard-flow-card flow-boss"><i class="bi bi-person-check"></i><span class="flow-label">หัวหน้าผ่านงาน</span><div class="flow-value">' + esc(bossCount) + '</div></div>';
        html += '</div>';
        html += '</section>';

        html += '<section class="dashboard-panel">';
        html += '<div class="dashboard-panel-head"><div><h3>สรุปตามวัตถุประสงค์</h3><p>สรุปจำนวนเอกสารแยกตามวัตถุประสงค์จากผลค้นหาปัจจุบัน</p></div><span class="dashboard-count-pill"><i class="bi bi-bar-chart"></i>' + esc(uniquePurposes) + ' ประเภท</span></div>';
        if (!purposeSummary.length) {
          html += '<div class="dashboard-empty">ไม่พบข้อมูลสำหรับสรุปตามวัตถุประสงค์</div>';
        } else {
          html += '<div class="purpose-summary-grid">';
          for (var i = 0; i < purposeSummary.length; i++) {
            var item = purposeSummary[i] || {};
            var pct = item.percentage != null ? Number(item.percentage || 0) : (totalDocuments ? (Number(item.count || 0) / totalDocuments) * 100 : 0);
            var width = Math.max(0, Math.min(100, pct));
            if (Number(item.count || 0) > 0 && width < 8) width = 8;
            var sheetCls = getSheetColorClass(item.sheetColor || '');
            html += '<article class="purpose-card ' + sheetCls + '">';
            html += '<div class="purpose-card-head"><div class="purpose-card-main"><div class="purpose-card-meta">' + buildSheetPill(item.sheetColor || '') + '</div><h4 class="purpose-card-title">' + esc(item.purpose || '-') + '</h4></div><div class="purpose-card-stat"><div class="purpose-card-count">' + esc(Number(item.count || 0)) + '</div><div class="purpose-percent">' + esc(formatPercent(pct)) + '</div></div></div>';
            html += '<div class="purpose-progress"><span class="purpose-progress-bar" style="width:' + width + '%"></span></div>';
            html += '<div class="purpose-card-foot"><span class="purpose-percent">จำนวน ' + esc(Number(item.count || 0)) + ' ฉบับ</span><span class="purpose-percent">หมวดใบงาน: ' + esc(normalizeSheetColorLabel(item.sheetColor || '') || 'อื่น ๆ') + '</span></div>';
            html += '</article>';
          }
          html += '</div>';
        }
        html += '</section>';
        html += '</div>';

        return html;
      }

      function buildPrintDashboardHtml(dashboard) {
        dashboard = dashboard || {};

        var totalDocuments = Number(dashboard.totalDocuments || 0);
        var uniquePurposes = Number(dashboard.uniquePurposes || 0);
        var verifyCount = Number(dashboard.verifyCount || 0);
        var bossCount = Number(dashboard.bossCount || 0);
        var latestVerifyDate = C.safeTrim(dashboard.latestVerifyDate || '') || '-';
        var purposeSummary = sortPurposeSummary(Array.isArray(dashboard.purposeSummary) ? dashboard.purposeSummary : []);
        var topPurpose = pickTopPurpose(purposeSummary);

        var html = '';
        html += '<div class="print-dashboard-grid">';
        html += '<div class="print-metrics-grid">';
        html += '<article class="print-metric metric-blue"><div class="print-metric-label">เอกสารทั้งหมด</div><div class="print-metric-value">' + esc(totalDocuments) + '</div><div class="print-metric-sub">ตรงกับผลค้นหาปัจจุบัน</div></article>';
        html += '<article class="print-metric metric-amber"><div class="print-metric-label">วัตถุประสงค์</div><div class="print-metric-value">' + esc(uniquePurposes) + '</div><div class="print-metric-sub">ประเภทที่พบ</div></article>';
        html += '<article class="print-metric metric-emerald"><div class="print-metric-label">ขั้นตรวจสอบ</div><div class="print-metric-value">' + esc(verifyCount) + '</div><div class="print-metric-sub">เอกสารในขั้นตรวจสอบ</div></article>';
        html += '<article class="print-metric metric-violet"><div class="print-metric-label">ขั้นหัวหน้าผ่านงาน</div><div class="print-metric-value">' + esc(bossCount) + '</div><div class="print-metric-sub">เอกสารในขั้นหัวหน้าผ่านงาน</div></article>';
        html += '</div>';

        html += '<section class="print-top-card">';
        html += '<div class="print-top-main">';
        html += '<div class="print-panel-kicker">วัตถุประสงค์เด่น</div>';
        if (topPurpose) {
          var topCount = Number(topPurpose.count || 0);
          var topPercent = topPurpose.percentage != null ? Number(topPurpose.percentage || 0) : (totalDocuments ? (topCount / totalDocuments) * 100 : 0);
          html += '<div class="print-top-row">';
          html += '<div class="print-top-text"><div class="print-purpose-pill-row">' + buildSheetPill(topPurpose.sheetColor || '') + '</div><div class="print-top-title">' + esc(topPurpose.purpose || '-') + '</div><div class="print-top-sub">วันที่ตรวจสอบล่าสุด: ' + esc(latestVerifyDate) + '</div></div>';
          html += '<div class="print-top-side"><div class="print-top-count">' + esc(topCount) + '</div><div class="print-top-percent">คิดเป็น ' + esc(formatPercent(topPercent)) + '</div></div>';
          html += '</div>';
        } else {
          html += '<div class="dashboard-empty">ยังไม่มีข้อมูลวัตถุประสงค์ในช่วงที่ค้นหา</div>';
        }
        html += '</div>';
        html += '</section>';

        html += '<section class="print-purpose-panel">';
        html += '<div class="print-purpose-head"><div><div class="print-panel-title">สรุปตามวัตถุประสงค์</div><div class="print-panel-sub">เรียงตามสีใบงานและสรุปในรูปแบบกระชับสำหรับ A4 แนวนอน</div></div><div class="print-purpose-head-meta">' + esc(uniquePurposes) + ' ประเภท</div></div>';
        if (!purposeSummary.length) {
          html += '<div class="dashboard-empty">ไม่พบข้อมูลสำหรับสรุปตามวัตถุประสงค์</div>';
        } else {
          html += '<div class="print-purpose-grid">';
          for (var i = 0; i < purposeSummary.length; i++) {
            var item = purposeSummary[i] || {};
            var pct = item.percentage != null ? Number(item.percentage || 0) : (totalDocuments ? (Number(item.count || 0) / totalDocuments) * 100 : 0);
            var width = Math.max(0, Math.min(100, pct));
            if (Number(item.count || 0) > 0 && width < 8) width = 8;
            var sheetCls = getSheetColorClass(item.sheetColor || '');
            html += '<article class="print-purpose-card ' + sheetCls + '">';
            html += '<div class="print-purpose-pill-row">' + buildSheetPill(item.sheetColor || '') + '</div>';
            html += '<div class="print-purpose-card-head"><div class="print-purpose-title">' + esc(item.purpose || '-') + '</div><div class="print-purpose-count">' + esc(Number(item.count || 0)) + '</div></div>';
            html += '<div class="print-purpose-progress"><span class="print-purpose-progress-bar" style="width:' + width + '%"></span></div>';
            html += '<div class="print-purpose-foot"><span>จำนวน ' + esc(Number(item.count || 0)) + ' ฉบับ</span><span>' + esc(formatPercent(pct)) + '</span></div>';
            html += '</article>';
          }
          html += '</div>';
        }
        html += '</section>';
        html += '</div>';

        return html;
      }

      function updateActiveFilterBadge() {
        var count = 0;
        if (state.advFilters.startDate || state.advFilters.endDate || state.advFilters.startTime || state.advFilters.endTime) count++;
        if (state.advFilters.selectedFiscalYears && state.advFilters.selectedFiscalYears.length > 0) count++;
        if (state.advFilters.group) count++;

        if (count > 0) {
          els.activeFilterBadge.style.display = 'inline-flex';
          els.activeFilterBadge.textContent = count + ' ตัวกรอง';
        } else {
          els.activeFilterBadge.style.display = 'none';
        }
      }

      function getDateRangeText() {
        var s = state.advFilters.startDate || '';
        var e = state.advFilters.endDate || '';
        var st = state.advFilters.startTime || '';
        var et = state.advFilters.endTime || '';

        var sTxt = state.advFilters.startDateText || s;
        var eTxt = state.advFilters.endDateText || e;

        var dateText = '';
        if (s || e) {
          if (s && e) dateText = 'ช่วงวันที่: ' + sTxt + ' - ' + eTxt;
          else if (s) dateText = 'ตั้งแต่วันที่: ' + sTxt;
          else dateText = 'ถึงวันที่: ' + eTxt;
        }

        var timeText = '';
        if (st || et) {
          if (st && et) timeText = 'ช่วงเวลา: ' + st + ' - ' + et;
          else if (st) timeText = 'ตั้งแต่เวลา: ' + st;
          else timeText = 'ถึงเวลา: ' + et;
        }

        if (dateText && timeText) return dateText + ' | ' + timeText;
        return dateText || timeText || '';
      }

      function showLoadingState() {
        els.docsList.className = 'loading-state';
        els.docsList.innerHTML = '<div class="loading-spinner"></div><div>กำลังโหลด...</div>';
      }

      function showEmptyState(message) {
        els.docsList.className = 'empty-state';
        els.docsList.innerHTML = '<i class="bi bi-inbox"></i><p style="margin:0;">' + esc(message || 'ไม่พบข้อมูล') + '</p>';
      }

      function goDoc(docId) {
        var id = C.safeTrim(docId || '');
        if (!id) return;
        C.redirect('document-view.html', { id: id });
      }

      function applyMainFilters() {
        var officer = C.safeTrim(els.mainOfficer.value || '');
        if (!officer) {
          Swal.fire('กรุณาเลือกเจ้าหน้าที่', '', 'warning');
          return;
        }

        var fy = C.safeTrim(els.mainFiscal.value || '');
        state.advFilters.officer = officer;
        state.advFilters.selectedFiscalYears = fy ? [fy] : [];
        state.hasSearched = true;

        updateActiveFilterBadge();
        loadReport();
      }

      function openAdvancedFilter() {
        var htmlContent = ''
          + '<div class="ins-adv-wrap">'
          + '<div class="ins-adv-intro"><i class="bi bi-sliders2"></i><p class="ins-adv-note">กำหนดช่วงวันที่ที่ต้องการ แล้วกดเพิ่มตัวกรองเพื่อใช้งานทันที</p></div>'
          + '<div class="ins-adv-grid">'
          + '<div class="ins-adv-field">'
          + '<label class="ins-adv-label">จากวันที่</label>'
          + '<div class="thai-date-input" onclick="openCalendar(\'inspStart\')">'
          + '<input type="hidden" id="inspStart" value="">'
          + '<div id="inspStartDisplay" class="ins-adv-date-display">เลือกวันที่...</div>'
          + '<i class="bi bi-calendar3 cal-icon"></i>'
          + '</div>'
          + '</div>'

          + '<div class="thai-date-input" onclick="openCalendar(\'inspEnd\')">'
          + '<input type="hidden" id="inspEnd" value="">'
          + '<div id="inspEndDisplay" class="ins-adv-date-display">เลือกวันที่...</div>'
          + '<i class="bi bi-calendar3 cal-icon"></i>'
          + '</div>'
          + '</div>'
          + '</div>'
          + '<div class="ins-adv-actions">'
          + '<button type="button" id="btnClearDateFilter" class="light-btn ins-adv-btn"><i class="bi bi-x-circle"></i>ล้าง</button>'

          + '</div>'
          + '</div>';

        Swal.fire({
          title: 'ตัวกรองขั้นสูง',
          customClass: {
            popup: 'ins-adv-popup',
            title: 'ins-adv-popup-title',
            htmlContainer: 'ins-adv-popup-html'
          },
          html: htmlContent,
          showConfirmButton: false,
          showCloseButton: true,
          didOpen: function () {
            var startEl = document.getElementById('inspStart');
            var endEl = document.getElementById('inspEnd');
            if (startEl) startEl.value = state.advFilters.startDate || '';
            if (endEl) endEl.value = state.advFilters.endDate || '';

            if (typeof window.updDD === 'function') {
              window.updDD('inspStart');
              window.updDD('inspEnd');
            }

            var clearBtn = document.getElementById('btnClearDateFilter');
            var applyBtn = document.getElementById('btnApplyDateFilter');

            if (clearBtn) {
              clearBtn.addEventListener('click', function () {
                if (startEl) startEl.value = '';
                if (endEl) endEl.value = '';
                state.advFilters.startDate = '';
                state.advFilters.endDate = '';
                state.advFilters.startDateText = '';
                state.advFilters.endDateText = '';
                if (typeof window.updDD === 'function') {
                  window.updDD('inspStart');
                  window.updDD('inspEnd');
                }
                updateActiveFilterBadge();
                if (state.hasSearched && state.advFilters.officer) loadReport();
              });
            }

            if (applyBtn) {
              applyBtn.addEventListener('click', function () {
                var sd = C.safeTrim((startEl && startEl.value) || '');
                var ed = C.safeTrim((endEl && endEl.value) || '');

                if (sd && ed && sd > ed) {
                  var tmp = sd;
                  sd = ed;
                  ed = tmp;
                  if (startEl) startEl.value = sd;
                  if (endEl) endEl.value = ed;
                  if (typeof window.updDD === 'function') {
                    window.updDD('inspStart');
                    window.updDD('inspEnd');
                  }
                }

                state.advFilters.startDate = sd;
                state.advFilters.endDate = ed;

                var sdTxt = (document.getElementById('inspStartDisplay') || {}).textContent || '';
                var edTxt = (document.getElementById('inspEndDisplay') || {}).textContent || '';
                state.advFilters.startDateText = (sd && sdTxt && sdTxt !== 'เลือกวันที่...') ? sdTxt : '';
                state.advFilters.endDateText = (ed && edTxt && edTxt !== 'เลือกวันที่...') ? edTxt : '';

                Swal.close();
                updateActiveFilterBadge();
                if (state.hasSearched && state.advFilters.officer) loadReport();
              });
            }
          }
        });
      }

      async function loadReport() {
        var officer = state.advFilters.officer || '';
        if (!officer) {
          Swal.fire('กรุณาเลือกเจ้าหน้าที่', '', 'warning');
          return;
        }

        var reqId = ++state.reportReqId;
        if (state.reportTimeout) {
          clearTimeout(state.reportTimeout);
          state.reportTimeout = null;
        }

        showLoadingState();
        els.btnSearchInspector.disabled = true;
        state.currentData = [];
        state.currentDashboard = null;
        if (els.btnPrint) els.btnPrint.style.display = 'none';
        if (els.statArea) els.statArea.style.display = 'none';
        if (els.dashboardArea) els.dashboardArea.style.display = 'none';

        state.reportTimeout = setTimeout(function () {
          if (reqId !== state.reportReqId) return;
          els.docsList.className = 'empty-state';
          els.docsList.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i><p style="margin:0;">โหลดรายงานนานกว่าปกติ</p><button type="button" class="light-btn" onclick="window.__reloadInspectorReport()" style="margin-top:8px;">ลองใหม่</button>';
        }, 15000);

        try {
          var res = await state.api.inspectionReport({
            officerName: officer,
            selectedFiscalYears: state.advFilters.selectedFiscalYears || [],
            startDate: state.advFilters.startDate || '',
            endDate: state.advFilters.endDate || '',
            startTime: state.advFilters.startTime || '',
            endTime: state.advFilters.endTime || '',
            group: state.advFilters.group || ''
          });

          if (reqId !== state.reportReqId) return;

          if (!res || res.success === false) {
            throw new Error((res && res.error) ? res.error : 'ไม่สามารถดึงรายงานได้');
          }

          renderReport(res);
        } catch (err) {
          if (reqId !== state.reportReqId) return;
          state.currentData = [];
          state.currentDashboard = null;
          if (els.statArea) els.statArea.style.display = 'none';
          if (els.dashboardArea) els.dashboardArea.style.display = 'none';
          showEmptyState('ไม่สามารถดึงรายงานได้');
          Swal.fire('เกิดข้อผิดพลาด', (err && err.message) ? err.message : 'ไม่สามารถดึงรายงานได้', 'error');
        } finally {
          if (reqId !== state.reportReqId) return;
          els.btnSearchInspector.disabled = false;
          if (state.reportTimeout) {
            clearTimeout(state.reportTimeout);
            state.reportTimeout = null;
          }
        }
      }

      function renderDashboard(summaryText) {
        if (!els.dashboardArea || !els.dashboardGrid) return;
        var dashboard = state.currentDashboard || buildDashboardFallback(state.currentData);
        els.dashboardArea.style.display = 'block';
        if (els.dashboardHint) {
          els.dashboardHint.textContent = summaryText || 'สรุปจำนวนเอกสารตามผลค้นหาปัจจุบัน';
        }
        els.dashboardGrid.innerHTML = buildDashboardHtml(dashboard, { summaryText: summaryText || '' });
      }

      function renderReport(data) {
        state.currentData = Array.isArray(data.documents) ? data.documents : [];
        state.currentDashboard = (data && data.dashboard && typeof data.dashboard === 'object')
          ? data.dashboard
          : buildDashboardFallback(state.currentData);

        els.statArea.style.display = 'block';
        els.btnPrint.style.display = state.currentData.length ? 'inline-flex' : 'none';

        els.totalCount.textContent = String(Number(data.totalCount || state.currentData.length || 0));
        els.officerName.textContent = C.safeTrim(data.officerName || '-') || '-';
        els.fiscalYear.textContent = C.safeTrim(data.fiscalYear || 'ทั้งหมด') || 'ทั้งหมด';

        var dr = getDateRangeText();
        var summaryText = 'เจ้าหน้าที่: ' + (data.officerName || '-') + ' | ปีงบประมาณ: ' + (data.fiscalYear || 'ทั้งหมด') + (dr ? (' | ' + dr) : '');
        els.printSubtitle.textContent = summaryText + ' | จำนวน ' + (data.totalCount || 0) + ' ฉบับ';

        var img = state.memberImgMap[data.officerName || ''] || '';
        if (img) {
          els.officerImg.src = img;
          els.officerImg.style.display = 'inline-block';
        } else {
          els.officerImg.style.display = 'none';
        }

        renderDashboard(summaryText);

        if (!state.currentData.length) {
          showEmptyState('ไม่พบเอกสารที่ตรวจสอบ');
          return;
        }

        var html = '';

        for (var i = 0; i < state.currentData.length; i++) {
          var d = state.currentData[i] || {};
          var am = C.safeTrim(d.amDocNo || '');
          var sdh = C.safeTrim(d.docNoSdh || '');
          var title = am || C.safeTrim(d.docId || '-') || '-';
          var sub = (sdh && sdh !== title) ? ('สธ ' + sdh) : '';
          var docHref = C.buildPageUrl('document-view.html', { id: d.docId || '' });
          var workflowStep = C.safeTrim(d.workflowStep || '');
          var workflowChipClass = workflowStep === 'หัวหน้าผ่านงาน' ? 'violet' : 'teal';

          var checkerHtml = '';
          if (img) {
            checkerHtml = '<span class="doc-checker"><img src="' + esc(img) + '" alt="u"><span>' + esc(data.officerName || '-') + '</span></span>';
          } else {
            var first = (C.safeTrim(data.officerName || '').charAt(0) || '?').toUpperCase();
            checkerHtml = '<span class="doc-checker"><span class="fallback">' + esc(first) + '</span><span>' + esc(data.officerName || '-') + '</span></span>';
          }

          html += '<a class="doc-item" href="' + esc(docHref) + '" data-doc-id="' + esc(d.docId || '') + '">';
          html += '<div class="doc-head">';
          html += '<div style="min-width:0;">';
          html += '<div class="doc-badges">';
          html += '<span class="chip blue">' + esc(d.fiscalYear || '-') + '</span>';
          if (workflowStep) html += '<span class="chip ' + workflowChipClass + '">' + esc(workflowStep) + '</span>';
          if (C.safeTrim(d.sheetColor || '')) html += buildSheetPill(d.sheetColor || '');
          html += '</div>';
          html += '<div class="doc-title">' + esc(title) + '</div>';
          if (sub) html += '<div class="doc-sub">' + esc(sub) + '</div>';
          html += '</div>';
          html += '<span class="chip gray"><i class="bi bi-calendar-check"></i>' + esc(d.verifyDate || '-') + '</span>';
          html += '</div>';

          html += '<p class="doc-subject">' + esc(d.subject || '-') + '</p>';

          html += '<div class="doc-meta">';
          html += '<span><i class="bi bi-building me-1"></i>' + esc(d.group || '-') + '</span>';
          html += '<span><i class="bi bi-person me-1"></i>' + esc(d.sender || '-') + '</span>';
          if (C.safeTrim(d.purpose || '')) {
            html += '<span><i class="bi bi-tag me-1"></i>' + esc(d.purpose) + '</span>';
          }
          html += checkerHtml;
          html += '</div>';

          html += '</a>';
        }

        els.docsList.className = '';
        els.docsList.innerHTML = html;

        var links = els.docsList.querySelectorAll('.doc-item');
        for (var j = 0; j < links.length; j++) {
          links[j].addEventListener('click', function (e) {
            e.preventDefault();
            var id = this.getAttribute('data-doc-id') || '';
            goDoc(id);
          });
        }
      }

      function fillFilters(infoData, membersData, meUser) {
        var info = infoData || { fiscalYears: [], groups: [] };
        var members = Array.isArray(membersData) ? membersData : [];

        var officerHtml = '<option value="" selected disabled>เลือกเจ้าหน้าที่...</option>';
        for (var i = 0; i < members.length; i++) {
          var m = members[i] || {};
          var name = C.safeTrim(m.name || '');
          if (!name) continue;
          var pos = C.safeTrim(m.position || '');
          officerHtml += '<option value="' + esc(name) + '">' + esc(name + (pos ? (' (' + pos + ')') : '')) + '</option>';
        }
        els.mainOfficer.innerHTML = officerHtml;

        var fiscalHtml = '<option value="" selected>ทั้งหมด</option>';
        var fiscalYears = Array.isArray(info.fiscalYears) ? info.fiscalYears : [];
        for (var f = 0; f < fiscalYears.length; f++) {
          fiscalHtml += '<option value="' + esc(fiscalYears[f]) + '">' + esc(fiscalYears[f]) + '</option>';
        }
        els.mainFiscal.innerHTML = fiscalHtml;

        var myName = C.safeTrim((meUser && (meUser.displayName || meUser.username)) || '');
        if (myName) {
          for (var k = 0; k < els.mainOfficer.options.length; k++) {
            if (els.mainOfficer.options[k].value === myName) {
              els.mainOfficer.selectedIndex = k;
              state.advFilters.officer = myName;
              break;
            }
          }
        }
      }

      async function initData() {
        var res = await Promise.all([
          state.api.me(),
          state.api.optionsInfo(),
          state.api.optionsMembers()
        ]);

        var meRes = res[0] || {};
        var infoRes = res[1] || {};
        var memberRes = res[2] || {};

        if (!meRes || meRes.success === false || !meRes.user) {
          C.redirect('index.html', {}, true);
          return false;
        }

        state.members = Array.isArray(memberRes.data) ? memberRes.data : [];
        state.memberImgMap = {};
        for (var i = 0; i < state.members.length; i++) {
          var mem = state.members[i] || {};
          var name = C.safeTrim(mem.name || '');
          var img = C.safeTrim(mem.image || '');
          if (!name || !img) continue;
          state.memberImgMap[name] = img;
          state.memberImgMap[name.toLowerCase()] = img;
        }

        fillFilters((infoRes && infoRes.data) ? infoRes.data : {}, state.members, meRes.user);
        updateActiveFilterBadge();
        return true;
      }

      function bindEvents() {
        els.btnBack.addEventListener('click', function () {
          C.redirect('index.html');
        });

        els.btnSearchInspector.addEventListener('click', applyMainFilters);
        els.btnAdvFilter.addEventListener('click', openAdvancedFilter);
        els.btnPrint.addEventListener('click', printReport);
      }

      async function init() {
        beginInitLoading('กำลังเตรียมหน้าตรวจสอบผลงาน...');
        try {
          state.settings = C.ensureSettingsOrThrow();
          state.api = C.createApiClient(state.settings);
        } catch (_e) {
          Swal.fire('ตั้งค่าไม่ครบ', 'กรุณาตั้งค่า scriptUrl และ deviceKey ที่หน้า index ก่อน', 'warning');
          if (els.mainCard) els.mainCard.style.display = 'block';
          endInitLoading();
          return;
        }

        bindEvents();

        try {
          var ok = await initData();
          if (!ok) return;
          if (els.mainCard) els.mainCard.style.display = 'block';
        } catch (err) {
          Swal.fire('เกิดข้อผิดพลาด', (err && err.message) ? err.message : 'โหลดข้อมูลหน้าตรวจสอบผลงานไม่สำเร็จ', 'error');
          if (els.mainCard) els.mainCard.style.display = 'block';
        } finally {
          endInitLoading();
        }
      }

      window.__reloadInspectorReport = function () {
        if (!state.hasSearched) return;
        loadReport();
      };

      init();
    })();
  </script>
</body>
</html>
